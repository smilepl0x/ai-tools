services:
  ollama:
    container_name: "ollama"
    image: ollama/ollama:latest
    ports:
      - "${HOST_PORT}:11434"
    volumes:
      - "${DATA_PATH}:/.ollama"
    user: "${UID}:${UID}"
    restart: unless-stopped
    networks:
      - "${NETWORK_NAME}"

networks:
  ollama:
    name: "${NETWORK_NAME}"
